# Docker Compose - Production
version: '3.8'

services:
  # ─────────────────────────────────────────────────────────
  # PostgreSQL Database (Production)
  # ─────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: obie-db-prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-obie}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: obie
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"  # Only accessible locally
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-obie}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # ─────────────────────────────────────────────────────────
  # Redis (Production)
  # ─────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: obie-redis-prod
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password}
    volumes:
      - redis_prod_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # ─────────────────────────────────────────────────────────
  # Backend API (Production)
  # ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: obie-backend-prod
    environment:
      ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-obie}:${POSTGRES_PASSWORD}@db:5432/obie
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/1
      SECRET_KEY: ${SECRET_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    volumes:
      - ./backend/logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4

  # ─────────────────────────────────────────────────────────
  # Celery Worker (Production)
  # ─────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: obie-celery-prod
    environment:
      ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-obie}:${POSTGRES_PASSWORD}@db:5432/obie
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/1
    depends_on:
      - db
      - redis
    restart: always
    command: celery -A app.tasks.celery_app worker --loglevel=warning --concurrency=4

  # ─────────────────────────────────────────────────────────
  # Celery Beat (Production)
  # ─────────────────────────────────────────────────────────
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: obie-beat-prod
    environment:
      ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-obie}:${POSTGRES_PASSWORD}@db:5432/obie
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/1
    depends_on:
      - redis
    restart: always
    command: celery -A app.tasks.celery_app beat --loglevel=warning

volumes:
  postgres_prod_data:
  redis_prod_data:

networks:
  default:
    name: obie-network-prod
